name: Docs link check

# Catch docs link-rot BEFORE release. The release pipeline (release.yml,
# publish-documentation job) copies markdown/**.md into the docs site's
# docs/api-reference/typescript/**.md and opens a PR against nevermined-io/docs.
# A link that resolves in this repo but is dead on the site (e.g.
# `](../../payments_py/x402/README.md)`) only fails AFTER release, when the
# bot's PR trips Mintlify link-rot — it bit nevermined-io/docs#234 (the Python
# sibling's v1.15.0 sync). These jobs fail fast at PR time instead.
#
# NOTE (repo admin): for `lint-links` to actually BLOCK a merge, add it to
# main's required status checks in branch protection — otherwise it is advisory.
# Same operational caveat as the payments-py sibling (#241).

on:
  push:
    branches: [main]
    paths:
      - 'markdown/**'
      - 'scripts/lint_doc_links.py'
      - 'scripts/check_synced_doc_links.sh'
      - '.github/workflows/docs-link-check.yml'
  pull_request:
    paths:
      - 'markdown/**'
      - 'scripts/lint_doc_links.py'
      - 'scripts/check_synced_doc_links.sh'
      - '.github/workflows/docs-link-check.yml'

jobs:
  # HARD GATE: deterministic, network-free escaping-link lint. Rejects the exact
  # class that broke the docs site (relative links escaping the synced tree /
  # pointing at repo source). Runs in milliseconds, never flakes.
  lint-links:
    name: Lint synced-doc links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Lint synced-doc links (escaping / repo-source links)
        run: python3 scripts/lint_doc_links.py

  # FULL CHECK: stage the synced TS pages into a minimal Mintlify project, then
  # run the REAL Mintlify checker against it. Internal links only (no
  # --check-external — external liveness is flaky and must not block). The TS
  # pages link only same-dir siblings, so a self-contained mini-site validates
  # them fully (no docs-site clone needed — see check_synced_doc_links.sh for
  # why this legitimately differs from the payments-py sibling). Depends on
  # `npx mintlify` (network); the release pipeline runs the same check too.
  staged-mintlify-check:
    name: Staged Mintlify broken-links
    runs-on: ubuntu-latest
    needs: lint-links
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Run staged Mintlify broken-links on the synced docs
        run: bash scripts/check_synced_doc_links.sh
