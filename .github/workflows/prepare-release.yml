name: Prepare Release (TS)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Create release branch
        id: info
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          BRANCH="release/v$VERSION"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update files
        run: |
          VERSION="${{ steps.info.outputs.version }}"

          # Update version in root package.json without creating a tag
          npm version "$VERSION" --no-git-tag-version

          # Update @nevermined-io/payments dependency version in CLI and OpenClaw
          # so published packages reference the exact SDK version they were built with
          cd cli && npm pkg set "dependencies.@nevermined-io/payments=$VERSION" && cd ..
          cd openclaw && npm pkg set "devDependencies.@nevermined-io/payments=$VERSION" && npm pkg set "peerDependencies.@nevermined-io/payments=>= $VERSION" && cd ..

          yarn install
          yarn run doc
          npx auto-changelog --latest-version "v$VERSION"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json cli/package.json openclaw/package.json CHANGELOG.md docs/
          git commit -m "chore: release v${{ steps.info.outputs.version }}"
          git push -u origin ${{ steps.info.outputs.branch }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr create \
            --title "🚀 Release v${{ steps.info.outputs.version }}" \
            --body "Automated release preparation for v${{ steps.info.outputs.version }}" \
            --base main \
            --head ${{ steps.info.outputs.branch }}