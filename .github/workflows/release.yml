name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install SDK dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm build

      - name: Install CLI dependencies
        working-directory: cli
        run: pnpm install --frozen-lockfile

      - name: Link local SDK into CLI
        run: rm -rf cli/node_modules/@nevermined-io/payments && ln -s "$PWD" cli/node_modules/@nevermined-io/payments

      - name: Generate CLI commands
        working-directory: cli
        run: pnpm generate || echo "Generation completed"

      - name: Build CLI
        working-directory: cli
        run: pnpm build:manifest

      - name: Run CLI tests
        working-directory: cli
        run: |
          pnpm test:unit
          pnpm test:integration

      - name: Install OpenClaw Plugin dependencies
        working-directory: openclaw
        run: pnpm install --frozen-lockfile

      - name: Link local SDK into OpenClaw Plugin
        run: rm -rf openclaw/node_modules/@nevermined-io/payments && ln -s "$PWD" openclaw/node_modules/@nevermined-io/payments

      - name: Build OpenClaw Plugin
        working-directory: openclaw
        run: pnpm build

      - name: Run OpenClaw Plugin tests
        working-directory: openclaw
        run: pnpm test

  publish-sdk:
    name: Publish SDK to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm build

      - name: Publish SDK package
        run: npm publish --access public

      - name: Pack SDK tarball
        run: npm pack

      - name: Upload SDK tarball
        uses: actions/upload-artifact@v4
        with:
          name: sdk-tarball
          path: '*.tgz'

  publish-cli:
    name: Publish CLI to npm
    needs: publish-sdk
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for OIDC
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org/

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Install SDK dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm build

      - name: Install CLI dependencies
        working-directory: cli
        run: pnpm install --frozen-lockfile

      - name: Link local SDK into CLI
        run: rm -rf cli/node_modules/@nevermined-io/payments && ln -s "$PWD" cli/node_modules/@nevermined-io/payments

      - name: Update CLI version
        working-directory: cli
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "${{ steps.version.outputs.version }}" ]; then
            npm version ${{ steps.version.outputs.version }} --no-git-tag-version
          fi
          echo "CLI version is ${{ steps.version.outputs.version }}"

      - name: Generate CLI commands
        working-directory: cli
        run: pnpm generate || echo "Generation completed"

      - name: Build CLI
        working-directory: cli
        run: pnpm build:manifest

      - name: Publish CLI package
        working-directory: cli
        run: npm publish --access public

      - name: Pack tarballs
        working-directory: cli
        run: npx oclif pack tarballs --no-xz

      - name: Upload CLI tarballs
        uses: actions/upload-artifact@v4
        with:
          name: cli-tarballs
          path: cli/dist/*.tar.gz

      - name: Commit CLI version update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cli/package.json
          git diff --cached --quiet || git commit -m "chore(cli): bump version to ${{ steps.version.outputs.version }}"
          git push origin HEAD:main || echo "Could not push to main (protected branch)"

  publish-openclaw:
    name: Publish OpenClaw Plugin to npm
    needs: publish-sdk
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for OIDC
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org/

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Install SDK dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm build

      - name: Install OpenClaw Plugin dependencies
        working-directory: openclaw
        run: pnpm install --frozen-lockfile

      - name: Link local SDK into OpenClaw Plugin
        run: rm -rf openclaw/node_modules/@nevermined-io/payments && ln -s "$PWD" openclaw/node_modules/@nevermined-io/payments

      - name: Update OpenClaw Plugin version
        working-directory: openclaw
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$RELEASE_VERSION" ]; then
            npm version "$RELEASE_VERSION" --no-git-tag-version
          fi
          # Keep openclaw.plugin.json in lockstep so the published tarball
          # never ships package.json and openclaw.plugin.json with different
          # version strings.
          node -e "
            const fs = require('node:fs');
            const path = 'openclaw.plugin.json';
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            data.version = process.env.RELEASE_VERSION;
            fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
          "
          echo "OpenClaw Plugin version is $RELEASE_VERSION (package.json + openclaw.plugin.json)"

      - name: Build OpenClaw Plugin
        working-directory: openclaw
        run: pnpm build

      - name: Run OpenClaw Plugin tests
        working-directory: openclaw
        run: pnpm test

      - name: Publish OpenClaw Plugin package
        working-directory: openclaw
        run: npm publish --access public --provenance

      - name: Pack OpenClaw Plugin tarball
        working-directory: openclaw
        run: npm pack

      - name: Upload OpenClaw Plugin tarball
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-tarball
          path: openclaw/*.tgz

      - name: Commit OpenClaw Plugin version update
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add openclaw/package.json openclaw/openclaw.plugin.json
          git diff --cached --quiet || git commit -m "chore(openclaw): bump version to $RELEASE_VERSION"
          git push origin HEAD:main || echo "Could not push to main (protected branch)"

  publish-clawhub:
    name: Publish OpenClaw Plugin to ClawHub
    needs: publish-openclaw
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Download OpenClaw Plugin tarball from publish-openclaw
        uses: actions/download-artifact@v4
        with:
          name: openclaw-tarball
          path: tarball

      - name: Resolve tarball path
        id: tarball
        # The CLI interprets bare paths as `owner/repo` GitHub references — the
        # leading `./` is required to force "this is a local file".
        run: |
          FILE=$(ls tarball/*.tgz | head -n1)
          if [ -z "$FILE" ]; then
            echo "::error::No .tgz found in the openclaw-tarball artifact."
            exit 1
          fi
          echo "path=./$FILE" >> "$GITHUB_OUTPUT"
          echo "Tarball: ./$FILE"

      - name: Install ClawHub CLI
        # Pinned to ^0.12 — bump deliberately when ClawHub ships a major.
        run: npm install -g clawhub@^0.12

      - name: Authenticate with ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "::error::CLAWHUB_TOKEN secret is not configured. Configure it in the repo or org settings to enable ClawHub publishing."
            exit 1
          fi
          clawhub login --token "$CLAWHUB_TOKEN"
          clawhub whoami

      - name: Dry-run ClawHub publish
        # When publishing from a tarball, the CLI cannot infer git source
        # attribution, so pass it explicitly from the GitHub Actions context.
        env:
          TARBALL: ${{ steps.tarball.outputs.path }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_COMMIT: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref }}
        run: |
          clawhub package publish "$TARBALL" \
            --family code-plugin \
            --source-repo "$SOURCE_REPO" \
            --source-commit "$SOURCE_COMMIT" \
            --source-ref "$SOURCE_REF" \
            --source-path openclaw \
            --dry-run --json

      - name: Publish OpenClaw Plugin to ClawHub
        # Re-runs of the same release tag should be idempotent: if the CLI fails
        # solely because this exact version is already published, swallow it.
        # Any other failure (auth, schema, network, validation) still fails the
        # job loudly so we don't ship a release that quietly skipped ClawHub.
        env:
          TARBALL: ${{ steps.tarball.outputs.path }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_COMMIT: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref }}
        run: |
          set +e
          OUT=$(clawhub package publish "$TARBALL" \
            --family code-plugin \
            --source-repo "$SOURCE_REPO" \
            --source-commit "$SOURCE_COMMIT" \
            --source-ref "$SOURCE_REF" \
            --source-path openclaw \
            --json 2>&1)
          STATUS=$?
          set -e
          echo "$OUT"
          if [ "$STATUS" -eq 0 ]; then
            exit 0
          fi
          if echo "$OUT" | grep -qiE "already (published|exists)|version (already|exists)|duplicate version|^http.*409|status\s*[:=]?\s*409|conflict"; then
            echo "::notice::ClawHub already has this version — treating as idempotent success."
            exit 0
          fi
          echo "::error::ClawHub publish failed for a reason other than 'already published'."
          exit "$STATUS"

  github-release:
    name: Create GitHub Release
    needs: [publish-cli, publish-openclaw]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download SDK tarball
        uses: actions/download-artifact@v4
        with:
          name: sdk-tarball
          path: sdk-tarball

      - name: Download CLI tarballs
        uses: actions/download-artifact@v4
        with:
          name: cli-tarballs
          path: cli-tarballs

      - name: Download OpenClaw Plugin tarball
        uses: actions/download-artifact@v4
        with:
          name: openclaw-tarball
          path: openclaw-tarball

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ ! -f "CHANGELOG.md" ]; then
            echo "use_auto_notes=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGELOG_CONTENT=$(awk "/^## \[?v?${VERSION}\]?/,/^## \[?v?[0-9]/" CHANGELOG.md | sed '1d;$d' || echo "")
          if [ -z "$CHANGELOG_CONTENT" ]; then
            echo "use_auto_notes=true" >> $GITHUB_OUTPUT
          else
            echo "use_auto_notes=false" >> $GITHUB_OUTPUT
            echo "$CHANGELOG_CONTENT" > /tmp/release_notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          USE_AUTO_NOTES="${{ steps.changelog.outputs.use_auto_notes }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi

          PRERELEASE_FLAG=""
          [[ "$VERSION" =~ (alpha|beta|rc|pre) ]] && PRERELEASE_FLAG="--prerelease"

          if [ "$USE_AUTO_NOTES" = "true" ]; then
            gh release create "$TAG" \
              --title "Nevermined Payments $TAG" \
              --generate-notes \
              $PRERELEASE_FLAG \
              sdk-tarball/*.tgz cli-tarballs/*.tar.gz openclaw-tarball/*.tgz
          else
            gh release create "$TAG" \
              --title "Nevermined Payments $TAG" \
              --notes-file /tmp/release_notes.md \
              $PRERELEASE_FLAG \
              sdk-tarball/*.tgz cli-tarballs/*.tar.gz openclaw-tarball/*.tgz
          fi

      - name: Summary
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          cat << 'SUMMARY' >> $GITHUB_STEP_SUMMARY
          ## Release Summary

          | Item | Status |
          |------|--------|
          | **Version** | TAG_PLACEHOLDER |
          | **SDK tarball** | Attached |
          | **CLI tarballs** | Attached |
          | **OpenClaw Plugin tarball** | Attached |
          | **Release URL** | RELEASE_URL_PLACEHOLDER |
          SUMMARY
          sed -i "s|TAG_PLACEHOLDER|$TAG|g" $GITHUB_STEP_SUMMARY
          sed -i "s|RELEASE_URL_PLACEHOLDER|https://github.com/${{ github.repository }}/releases/tag/$TAG|g" $GITHUB_STEP_SUMMARY

  publish-documentation:
    name: Publish Documentation
    needs: publish-cli
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-beta') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout payments repository
        uses: actions/checkout@v4
        with:
          path: payments

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify SDK documentation exists
        run: |
          if [ ! -d "payments/markdown" ]; then
            echo "Error: markdown directory not found"
            exit 1
          fi
          FILE_COUNT=$(find payments/markdown -name "*.md" -not -name "README.md" | wc -l)
          echo "Found $FILE_COUNT SDK documentation files"
          if [ "$FILE_COUNT" -lt 11 ]; then
            echo "Error: Expected at least 11 SDK documentation files, found $FILE_COUNT"
            exit 1
          fi

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: nevermined-io

      - name: Checkout docs_mintlify repository
        uses: actions/checkout@v4
        with:
          repository: nevermined-io/docs_mintlify
          token: ${{ steps.app-token.outputs.token }}
          path: docs_mintlify

      - name: Update SDK documentation
        run: |
          TARGET_DIR="docs_mintlify/docs/api-reference/typescript"
          mkdir -p "$TARGET_DIR"
          rm -f "$TARGET_DIR"/*.md
          cp payments/markdown/*.md "$TARGET_DIR/"
          rm -f "$TARGET_DIR/README.md"
          COPIED_COUNT=$(find "$TARGET_DIR" -name "*.md" | wc -l)
          echo "Copied $COPIED_COUNT SDK documentation files"

      - name: Update CLI documentation
        run: |
          mkdir -p docs_mintlify/docs/api-reference/cli
          cp -r payments/cli/docs/* docs_mintlify/docs/api-reference/cli/ || echo "CLI docs not found, skipping"
          cp payments/cli/README.md docs_mintlify/docs/api-reference/cli/index.md || echo "CLI README not found"

      - name: Update OpenClaw Plugin documentation
        run: |
          mkdir -p docs_mintlify/docs/api-reference/openclaw-plugin
          cp -r payments/openclaw/docs/* docs_mintlify/docs/api-reference/openclaw-plugin/ || echo "OpenClaw docs not found, skipping"
          cp payments/openclaw/README.md docs_mintlify/docs/api-reference/openclaw-plugin/index.md || echo "OpenClaw README not found"

      - name: Create documentation PR
        working-directory: docs_mintlify
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          BRANCH_NAME="docs/payments-v${{ steps.version.outputs.version }}"
          git checkout -b "$BRANCH_NAME"

          git add docs/api-reference/typescript docs/api-reference/cli docs/api-reference/openclaw-plugin

          if git diff --cached --quiet; then
            echo "No documentation changes to publish for v${{ steps.version.outputs.version }}"
            exit 0
          fi

          git commit -m "$(cat <<'EOF'
          docs: update Payments SDK, CLI and OpenClaw Plugin documentation for v${{ steps.version.outputs.version }}

          - Updated SDK documentation in docs/api-reference/typescript/
          - Updated CLI documentation in docs/api-reference/cli/
          - Updated OpenClaw Plugin documentation in docs/api-reference/openclaw-plugin/
          - Version: ${{ steps.version.outputs.version }}
          - Auto-generated from nevermined-io/payments@${{ github.sha }}

          Co-Authored-By: GitHub Actions <github-actions[bot]@users.noreply.github.com>
          EOF
          )"

          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "docs: Payments SDK, CLI & OpenClaw Plugin v${{ steps.version.outputs.version }}" \
            --body "$(cat <<'EOF'
          ## Documentation Update

          This PR updates the documentation for Nevermined Payments SDK, CLI and OpenClaw Plugin to version **v${{ steps.version.outputs.version }}**.

          ### Changes
          - SDK documentation in `docs/api-reference/typescript/`
          - CLI documentation in `docs/api-reference/cli/`
          - OpenClaw Plugin documentation in `docs/api-reference/openclaw-plugin/`
          - Version metadata added to all files

          ### Source
          - Repository: nevermined-io/payments
          - Tag: v${{ steps.version.outputs.version }}
          - Commit: ${{ github.sha }}

          ### Links
          - [CLI on npm](https://www.npmjs.com/package/@nevermined-io/cli)
          - [SDK on npm](https://www.npmjs.com/package/@nevermined-io/payments)
          - [OpenClaw Plugin on npm](https://www.npmjs.com/package/@nevermined-io/openclaw-plugin)
          - [GitHub Release](https://github.com/nevermined-io/payments/releases/tag/v${{ steps.version.outputs.version }})

          ---
          Auto-generated by GitHub Actions
          EOF
          )" \
            --base main \
            --head "$BRANCH_NAME"

          gh pr merge "$BRANCH_NAME" --auto --squash || echo "Auto-merge not available"

      - name: Create summary
        run: |
          echo "### Documentation Publication Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Source Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Repository**: nevermined-io/docs_mintlify" >> $GITHUB_STEP_SUMMARY
          echo "- **SDK Docs**: docs/api-reference/typescript/" >> $GITHUB_STEP_SUMMARY
          echo "- **CLI Docs**: docs/api-reference/cli/" >> $GITHUB_STEP_SUMMARY
          echo "- **OpenClaw Plugin Docs**: docs/api-reference/openclaw-plugin/" >> $GITHUB_STEP_SUMMARY
