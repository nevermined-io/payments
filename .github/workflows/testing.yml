name: Payments Tests

on: [push]

concurrency:
  group: payments-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

  cli_sync_check:
    name: CLI Sync Check
    runs-on: ubuntu-latest
    needs: lint_build
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm build

      - name: Install CLI dependencies
        working-directory: cli
        run: pnpm install --frozen-lockfile

      - name: Link local SDK into CLI
        run: rm -rf cli/node_modules/@nevermined-io/payments && ln -s "$PWD" cli/node_modules/@nevermined-io/payments

      - name: Build CLI
        working-directory: cli
        # Use build:manifest (not just build) so oclif.manifest.json is
        # written. Without the manifest, oclif walks src/ when resolving
        # commands with positional args and chokes on the .ts files'
        # `.js` ESM import paths. Mirrors cli-sync-and-test.yml.
        run: pnpm build:manifest

      - name: Debug manifest + dist (TEMP — remove before merge)
        working-directory: cli
        run: |
          echo "=== Run cli-basic.test.ts FIRST then verify manifest ==="
          npx jest test/integration/cli-basic.test.ts --no-color 2>&1 | tail -15 || echo "CLI BASIC FAILED"
          echo "=== Manifest after cli-basic ==="
          ls -la oclif.manifest.json 2>&1 || echo "MANIFEST GONE"
          ls -la dist/commands/x402token/ 2>&1 || echo "DIST GONE"
          echo "=== Direct invocation after cli-basic ==="
          node bin/run.js x402token build-payment-required 12345 --resource-url 'https://example.com/test' -f json 2>&1 | head -25 || echo "DIRECT FAILED EXIT=$?"

      - name: Run CLI sync check
        working-directory: cli
        run: pnpm sync-check

      - name: Run CLI tests
        working-directory: cli
        run: pnpm test

  openclaw_check:
    name: OpenClaw Plugin Check
    runs-on: ubuntu-latest
    needs: lint_build
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm build

      - name: Install OpenClaw Plugin dependencies
        working-directory: openclaw
        run: pnpm install --frozen-lockfile

      - name: Link local SDK into OpenClaw Plugin
        run: rm -rf openclaw/node_modules/@nevermined-io/payments && ln -s "$PWD" openclaw/node_modules/@nevermined-io/payments

      - name: Build OpenClaw Plugin
        working-directory: openclaw
        run: pnpm build

      - name: Run OpenClaw Plugin tests
        working-directory: openclaw
        run: pnpm test

  unit_integration:
    name: Unit & Integration
    runs-on: ubuntu-latest
    needs: lint_build
    timeout-minutes: 25
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run integration tests
        env:
          TEST_SUBSCRIBER_API_KEY: ${{ secrets.TEST_SUBSCRIBER_API_KEY }}
          TEST_BUILDER_API_KEY: ${{ secrets.TEST_BUILDER_API_KEY }}
          TEST_ENVIRONMENT: ${{ secrets.TEST_ENVIRONMENT }}
        run: pnpm test:integration

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: unit_integration
    continue-on-error: true
    timeout-minutes: 40
    env:
      TEST_SUBSCRIBER_API_KEY: ${{ secrets.TEST_SUBSCRIBER_API_KEY }}
      TEST_BUILDER_API_KEY: ${{ secrets.TEST_BUILDER_API_KEY }}
      TEST_ENVIRONMENT: staging_sandbox
      NVM_FRONTEND_URL: https://api-base-sepolia.staging.nevermined.app/
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run E2E tests
        run: pnpm test:e2e --detectOpenHandles
